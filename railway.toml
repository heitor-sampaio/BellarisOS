[build]
builder = "nixpacks"
buildCommand = "corepack disable && npm install -g pnpm@11.8.0 && pnpm install --frozen-lockfile && pnpm --filter=web build"

[deploy]
startCommand = "node apps/web/.next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
